services:
  bot:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://bot:secret@db:5432/textworld_bot
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1

  redis:
    image: "redis:7-alpine"
    restart: always
    ports:
      - "6379:6379"

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: textworld_bot
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d textworld_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - bot

  ollama:
    image: ollama/ollama:0.6.6
    restart: always
    environment:
      - OLLAMA_KEEP_ALIVE=1h
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ./models/Modelfile:/models/Modelfile:ro
      - ./adapters:/adapters
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434" # опционально для отладки
    deploy:
      resources:
        limits:
          memory: 5G  

volumes:
  pgdata:
  ollama_data: